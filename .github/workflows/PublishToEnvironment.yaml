name: Publish AL Extension

on:
  workflow_dispatch:
    inputs:
      setup_no:
        description: 'Setup Number'
        required: true
      generated_file_name:
        description: 'Generated file name from BC (informational)'
        required: true
      publish_to_bc:
        description: 'Publish to Business Central SaaS'
        required: false
        default: 'yes'
      app_file:
        description: 'Optional relative path to .app file (for example output/MyApp.app)'
        required: false
        default: ''

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  package:
    name: Resolve App Package
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log workflow inputs
        shell: pwsh
        run: |
          Write-Host "Setup No: ${{ github.event.inputs.setup_no }}"
          Write-Host "Generated File: ${{ github.event.inputs.generated_file_name }}"
          Write-Host "Publish to BC: ${{ github.event.inputs.publish_to_bc }}"
          Write-Host "App file input: ${{ github.event.inputs.app_file }}"

      - name: Resolve app package path
        id: resolve
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $inputApp = '${{ github.event.inputs.app_file }}'
          $resolved = ''

          if ($inputApp -ne '') {
            $candidate = Join-Path $env:GITHUB_WORKSPACE $inputApp
            if (Test-Path $candidate) {
              $resolved = (Resolve-Path $candidate).Path
            } else {
              throw "Configured app_file '$inputApp' was not found in repository."
            }
          }

          if ($resolved -eq '') {
            $searchPaths = @(
              $env:GITHUB_WORKSPACE,
              (Join-Path $env:GITHUB_WORKSPACE 'output'),
              (Join-Path $env:GITHUB_WORKSPACE 'release'),
              (Join-Path $env:GITHUB_WORKSPACE 'artifacts')
            )

            $apps = @()
            foreach ($path in $searchPaths) {
              if (Test-Path $path) {
                $apps += Get-ChildItem -Path (Join-Path $path '*.app') -File -ErrorAction SilentlyContinue
              }
            }

            if (-not $apps -or $apps.Count -eq 0) {
              $apps = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -Filter *.app -File -ErrorAction SilentlyContinue |
                Where-Object { $_.FullName -notmatch '\\.alpackages\\' }
            }

            $apps = $apps |
              Where-Object { $_.FullName -notmatch '\\.alpackages\\' } |
              Sort-Object LastWriteTimeUtc -Descending

            if (-not $apps -or $apps.Count -eq 0) {
              Write-Host 'No candidate .app files detected. Repository root files:'
              Get-ChildItem -Path $env:GITHUB_WORKSPACE -File -ErrorAction SilentlyContinue | Select-Object Name,Length | Format-Table -AutoSize | Out-String | Write-Host
              throw 'No .app file found in repository. Add an .app file or pass workflow input app_file.'
            }

            Write-Host 'Candidate app files:'
            $apps | Select-Object FullName,Length,LastWriteTimeUtc | Format-Table -AutoSize | Out-String | Write-Host
            $resolved = $apps[0].FullName
          }

          New-Item -ItemType Directory -Path "$env:GITHUB_WORKSPACE\output" -Force | Out-Null
          Copy-Item -Path $resolved -Destination "$env:GITHUB_WORKSPACE\output\app-to-publish.app" -Force
          Write-Host "Selected app package: $resolved"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: bc-al-app
          path: output/app-to-publish.app

  publish:
    name: Publish to Business Central SaaS
    needs: package
    if: ${{ github.event.inputs.publish_to_bc == 'yes' }}
    runs-on: windows-latest

    steps:
      - name: Download app artifact
        uses: actions/download-artifact@v4
        with:
          name: bc-al-app
          path: output

      - name: Install BcContainerHelper
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted

          try {
            Install-Module BcContainerHelper -Scope CurrentUser -Force -AllowClobber -Repository PSGallery
          }
          catch {
            if (Get-Command Install-PSResource -ErrorAction SilentlyContinue) {
              Install-PSResource BcContainerHelper -Scope CurrentUser -TrustRepository -Reinstall -Quiet
            }
            else {
              throw
            }
          }

          Import-Module BcContainerHelper -Force
          Write-Host 'BcContainerHelper installed.'

      - name: Publish app to BC SaaS
        shell: pwsh
        env:
          BC_TENANT_ID: ${{ secrets.BC_TENANT_ID }}
          BC_CLIENT_ID: ${{ secrets.BC_CLIENT_ID }}
          BC_CLIENT_SECRET: ${{ secrets.BC_CLIENT_SECRET }}
          BC_ENVIRONMENT_NAME: ${{ secrets.BC_ENVIRONMENT_NAME }}
          BC_ENVIRONMENT_URL: ${{ secrets.BC_ENVIRONMENT_URL }}
        run: |
          $ErrorActionPreference = 'Stop'

          if ([string]::IsNullOrWhiteSpace($env:BC_TENANT_ID)) { throw 'Missing secret BC_TENANT_ID' }
          if ([string]::IsNullOrWhiteSpace($env:BC_CLIENT_ID)) { throw 'Missing secret BC_CLIENT_ID' }
          if ([string]::IsNullOrWhiteSpace($env:BC_CLIENT_SECRET)) { throw 'Missing secret BC_CLIENT_SECRET' }
          $environmentName = $env:BC_ENVIRONMENT_NAME
          if ([string]::IsNullOrWhiteSpace($environmentName) -and -not [string]::IsNullOrWhiteSpace($env:BC_ENVIRONMENT_URL)) {
            try {
              $uri = [System.Uri]$env:BC_ENVIRONMENT_URL
              $parts = $uri.AbsolutePath.Trim('/') -split '/'
              if ($parts.Length -gt 0) {
                $environmentName = $parts[$parts.Length - 1]
              }
            } catch {
            }
          }

          if ([string]::IsNullOrWhiteSpace($environmentName)) {
            throw 'Missing environment configuration. Set BC_ENVIRONMENT_NAME (preferred) or BC_ENVIRONMENT_URL.'
          }

          $appPath = Join-Path $env:GITHUB_WORKSPACE 'output\app-to-publish.app'
          if (-not (Test-Path $appPath)) { throw "App artifact not found at $appPath" }

          Import-Module BcContainerHelper -Force

          $authCommand = Get-Command New-BcAuthContext -ErrorAction Stop
          $authParams = @{}
          if ($authCommand.Parameters.ContainsKey('tenantID')) { $authParams['tenantID'] = $env:BC_TENANT_ID }
          if ($authCommand.Parameters.ContainsKey('tenantId')) { $authParams['tenantId'] = $env:BC_TENANT_ID }
          if ($authCommand.Parameters.ContainsKey('clientID')) { $authParams['clientID'] = $env:BC_CLIENT_ID }
          if ($authCommand.Parameters.ContainsKey('clientId')) { $authParams['clientId'] = $env:BC_CLIENT_ID }
          if ($authCommand.Parameters.ContainsKey('clientSecret')) { $authParams['clientSecret'] = $env:BC_CLIENT_SECRET }
          if ($authCommand.Parameters.ContainsKey('scopes')) { $authParams['scopes'] = 'https://api.businesscentral.dynamics.com/.default' }
          if ($authCommand.Parameters.ContainsKey('scope')) { $authParams['scope'] = 'https://api.businesscentral.dynamics.com/.default' }

          $bcAuthContext = New-BcAuthContext @authParams

          $publishCommand = Get-Command Publish-PerTenantExtensionApps -ErrorAction Stop
          $publishParams = @{}
          if ($publishCommand.Parameters.ContainsKey('bcAuthContext')) { $publishParams['bcAuthContext'] = $bcAuthContext }
          if ($publishCommand.Parameters.ContainsKey('environment')) { $publishParams['environment'] = $environmentName }
          if ($publishCommand.Parameters.ContainsKey('appFiles')) { $publishParams['appFiles'] = @($appPath) }
          if ($publishCommand.Parameters.ContainsKey('scope')) { $publishParams['scope'] = 'Tenant' }
          if ($publishCommand.Parameters.ContainsKey('sync')) { $publishParams['sync'] = $true }
          if ($publishCommand.Parameters.ContainsKey('install')) { $publishParams['install'] = $true }
          if ($publishCommand.Parameters.ContainsKey('schemaSyncMode')) { $publishParams['schemaSyncMode'] = 'Add' }
          if ($publishCommand.Parameters.ContainsKey('tenant')) { $publishParams['tenant'] = 'default' }

          Publish-PerTenantExtensionApps @publishParams
          Write-Host "Publish completed for environment '$environmentName'."
