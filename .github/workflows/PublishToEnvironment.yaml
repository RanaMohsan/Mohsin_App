name: Publish AL Extension

on:
  workflow_dispatch:
    inputs:
      publish_to_bc:
        description: 'Publish to Business Central SaaS'
        required: false
        default: 'yes'
      app_file:
        description: 'Optional path to .app file (example: output/app.app)'
        required: false
        default: ''

jobs:
  package:
    name: Get App File
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find .app file
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $inputApp = '${{ github.event.inputs.app_file }}'
          $resolved = ''

          if ($inputApp -ne '') {
            $path = Join-Path $env:GITHUB_WORKSPACE $inputApp
            if (Test-Path $path) {
              $resolved = $path
            } else {
              throw 'Provided app_file not found'
            }
          }

          if ($resolved -eq '') {
            $apps = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -Filter *.app -File |
              Where-Object { $_.FullName -notmatch '\\.alpackages\\' } |
              Sort-Object LastWriteTimeUtc -Descending

            if (!$apps) {
              throw 'No .app file found in repo'
            }

            $resolved = $apps[0].FullName
          }

          New-Item -ItemType Directory -Path "$env:GITHUB_WORKSPACE\output" -Force | Out-Null
          Copy-Item $resolved "$env:GITHUB_WORKSPACE\output\app.app" -Force

          Write-Host "Using App File: $resolved"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bc-app
          path: output/app.app

  publish:
    name: Publish to BC SaaS
    needs: package
    if: ${{ github.event.inputs.publish_to_bc == 'yes' }}
    runs-on: windows-latest

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: bc-app
          path: output

      - name: Install BcContainerHelper
        shell: pwsh
        run: |
          Install-Module BcContainerHelper -Scope CurrentUser -Force -AllowClobber
          Import-Module BcContainerHelper

      - name: DEBUG (Check Secrets)
        shell: pwsh
        env:
          TENANT_ID: ${{ secrets.BC_TENANT_ID }}
          CLIENT_ID: ${{ secrets.BC_CLIENT_ID }}
          ENVIRONMENT: ${{ secrets.BC_ENVIRONMENT_NAME }}
        run: |
          Write-Host "TENANT_ID: $env:TENANT_ID"
          Write-Host "CLIENT_ID: $env:CLIENT_ID"
          Write-Host "ENVIRONMENT: $env:ENVIRONMENT"

      - name: Publish App
        shell: pwsh
        env:
          TENANT_ID: ${{ secrets.BC_TENANT_ID }}
          CLIENT_ID: ${{ secrets.BC_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.BC_CLIENT_SECRET }}
          ENVIRONMENT: ${{ secrets.BC_ENVIRONMENT_NAME }}
        run: |
          $ErrorActionPreference = 'Stop'

          # VALIDATION
          if (-not $env:TENANT_ID) { throw 'TENANT_ID missing' }
          if (-not $env:CLIENT_ID) { throw 'CLIENT_ID missing' }
          if (-not $env:CLIENT_SECRET) { throw 'CLIENT_SECRET missing' }
          if (-not $env:ENVIRONMENT) { throw 'ENVIRONMENT missing' }

          $appFile = Join-Path $env:GITHUB_WORKSPACE "output\app.app"

          if (!(Test-Path $appFile)) {
            throw 'App file not found!'
          }

          try {
              Write-Host 'Authenticating...'

              $authContext = New-BcAuthContext `
                -tenantId $env:TENANT_ID `
                -clientId $env:CLIENT_ID `
                -clientSecret $env:CLIENT_SECRET `
                -scope "https://api.businesscentral.dynamics.com/.default"

              Write-Host 'Publishing App...'

              Publish-PerTenantExtensionApp `
                -bcAuthContext $authContext `
                -environment $env:ENVIRONMENT `
                -appFile $appFile `
                -sync `
                -install `
                -schemaSyncMode Add `
                -tenant default

              Write-Host 'SUCCESS: App Published!'
          }
          catch {
              Write-Host 'ERROR DETAILS BELOW:'
              $_ | Format-List * -Force
              throw
          }
